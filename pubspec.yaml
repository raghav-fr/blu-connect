name: blue_connect
description: "RescueLink - Bluetooth-based disaster communication app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  uuid: ^4.5.1
  geolocator: ^13.0.2
  shared_preferences: ^2.3.4
  flutter_blue_plus: ^1.35.2
  ble_peripheral: ^2.4.0
  permission_handler: ^11.3.1
  sensors_plus: ^6.1.1
  flutter_vibrate: ^1.3.0
  flutter_p2p_connection: ^3.0.3
  image_picker: ^1.1.2
  battery_plus: ^6.2.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  encrypt: ^5.0.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
